<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Blood on the River</title>
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, minimum-scale=1, width=device-width, height=device-height">
</head>

<body>
    <div id="rpg"></div>

    <!-- Storm overlay -->
    <div id="storm-overlay" class="storm-hidden">
        <div class="rain"></div>
        <div class="rain"></div>
        <div class="rain"></div>
        <div class="lightning"></div>
    </div>

    <style>
        body,
        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hide the RPG-JS menu icon from mobile-gui */
        .menu-access {
            display: none !important;
        }

        #rpg {
            position: relative;
        }

        @media (min-width: 800px) {
            #rpg {
                width: 816px;
                height: 624px;
            }
        }

        @media (max-width: 800px) {
            #rpg {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
            }
        }

        /* ===== STORM EFFECTS ===== */
        #storm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            transition: opacity 1s ease;
        }

        #storm-overlay.storm-hidden {
            opacity: 0;
            display: none;
        }

        #storm-overlay.storm-active {
            opacity: 1;
            display: block;
        }

        /* Dark overlay for stormy sky */
        #storm-overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.45);
            z-index: 1;
        }

        /* Rain streaks */
        .rain {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 200%;
            z-index: 2;
            background-image:
                linear-gradient(transparent 90%, rgba(174, 194, 224, 0.4) 90%, rgba(174, 194, 224, 0.4) 91%, transparent 91%),
                linear-gradient(transparent 85%, rgba(174, 194, 224, 0.3) 85%, rgba(174, 194, 224, 0.3) 86%, transparent 86%);
            background-size: 3px 40px, 5px 55px;
            animation: rain-fall linear infinite;
        }

        .rain:nth-child(1) {
            animation-duration: 0.4s;
            background-size: 2px 35px, 4px 50px;
            opacity: 0.8;
        }

        .rain:nth-child(2) {
            animation-duration: 0.55s;
            background-size: 3px 42px, 5px 60px;
            opacity: 0.6;
            left: 10px;
        }

        .rain:nth-child(3) {
            animation-duration: 0.35s;
            background-size: 2px 30px, 3px 45px;
            opacity: 0.9;
            left: -5px;
        }

        @keyframes rain-fall {
            0% {
                transform: translateY(0) rotate(5deg);
            }
            100% {
                transform: translateY(50%) rotate(5deg);
            }
        }

        /* Lightning flash */
        .lightning {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            background: white;
            opacity: 0;
            animation: lightning-flash 4s infinite;
        }

        @keyframes lightning-flash {
            0% { opacity: 0; }
            1% { opacity: 0.6; }
            2% { opacity: 0; }
            3% { opacity: 0.3; }
            4% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Screen shake during storm */
        #rpg.storm-shake {
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, -1px); }
            75% { transform: translate(-1px, 2px); }
            100% { transform: translate(1px, -2px); }
        }
    </style>

    <!-- Debug Panel (dev mode only — hidden in production builds) -->
    <div id="debug-panel" style="display:none">
        <div id="debug-toggle" onclick="document.getElementById('debug-panel').classList.toggle('open')">DEBUG</div>
        <div id="debug-content">
            <h3>Quest State</h3>
            <div class="debug-section">
                <label>Current Quest</label>
                <select id="dbg-current-quest" onchange="dbgSet('current_quest', +this.value)">
                    <option value="0">0 - Not started</option>
                    <option value="1">1 - Voyage</option>
                    <option value="2">2 - Building</option>
                    <option value="3">3 - Hunting</option>
                    <option value="4">4 - Powhatan</option>
                    <option value="5">5 - Finale</option>
                </select>
            </div>

            <h4>Quest 1: Voyage</h4>
            <div class="debug-section">
                <label>1a Meet Smith</label>
                <select onchange="dbgSet('quest_1a', this.value)">
                    <option value="">—</option>
                    <option value="active">active</option>
                    <option value="complete">complete</option>
                </select>
            </div>
            <div class="debug-section">
                <label>1b Crates</label>
                <select onchange="dbgSet('quest_1b', this.value)">
                    <option value="">—</option>
                    <option value="active">active</option>
                    <option value="complete">complete</option>
                </select>
                <input type="number" min="0" max="3" value="0" style="width:40px" onchange="dbgSet('quest_1b_crates', +this.value)" placeholder="crates">
            </div>
            <div class="debug-section">
                <label>1c Storm</label>
                <select onchange="dbgSet('quest_1c', this.value)">
                    <option value="">—</option>
                    <option value="active">active</option>
                    <option value="survived">survived</option>
                    <option value="complete">complete</option>
                </select>
                <input type="number" min="0" max="3" value="0" style="width:40px" onchange="dbgSet('storm_hits', +this.value)" placeholder="hits">
            </div>
            <div class="debug-section">
                <label>1d Friend</label>
                <select onchange="dbgSet('quest_1d', this.value)">
                    <option value="">—</option>
                    <option value="active">active</option>
                    <option value="complete">complete</option>
                </select>
            </div>

            <h4 style="color:#0f0;font-size:13px">QUICK JUMP (use these!)</h4>
            <div class="debug-section">
                <button onclick="dbgJumpTo('quest1-start')" style="background:#0a4400">Q1 Ship</button>
                <button onclick="dbgJumpTo('quest1-crates')">Q1 Crates</button>
                <button onclick="dbgJumpTo('quest1-storm')">Q1 Storm</button>
                <button onclick="dbgJumpTo('quest1-friend')">Q1 Friend</button>
                <button onclick="dbgJumpTo('quest1-done')">Q1 Done</button>
            </div>
            <div class="debug-section">
                <button onclick="dbgJumpTo('quest2-start')" style="background:#0a4400">Q2 Jamestown</button>
                <button onclick="dbgJumpTo('quest2-build')">Q2 Build</button>
                <button onclick="dbgJumpTo('quest2-done')">Q2 Done</button>
            </div>
            <div class="debug-section">
                <button onclick="dbgJumpTo('quest3-start')" style="background:#0a4400">Q3 Wilderness</button>
                <button onclick="dbgJumpTo('quest4-start')" style="background:#0a4400">Q4 Powhatan</button>
                <button onclick="dbgJumpTo('quest4-done')">Q4 Done</button>
                <button onclick="dbgJumpTo('quest5-start')" style="background:#0a4400">Q5 Finale</button>
            </div>

            <h4>Map</h4>
            <div class="debug-section">
                <button onclick="dbgChangeMap('ship')">Ship</button>
                <button onclick="dbgChangeMap('jamestown')">Jamestown</button>
                <button onclick="dbgChangeMap('wilderness')">Wilderness</button>
                <button onclick="dbgChangeMap('powhatan-village')">Powhatan</button>
            </div>

            <h4>Storm FX</h4>
            <div class="debug-section">
                <button onclick="localStorage.setItem('storm-active','true')">Storm ON</button>
                <button onclick="localStorage.setItem('storm-active','false')">Storm OFF</button>
            </div>

            <h4>Live Variables <button onclick="dbgCopyVars()" style="font-size:9px">Copy</button></h4>
            <pre id="dbg-vars" style="font-size:10px;max-height:150px;overflow:auto;background:#111;padding:4px;margin:4px 0;">Loading...</pre>
        </div>
    </div>

    <style>
        /* ===== DEBUG PANEL ===== */
        #debug-panel {
            position: fixed;
            top: 0;
            right: 0;
            z-index: 10000;
            font-family: monospace;
            font-size: 11px;
            color: #0f0;
            pointer-events: auto;
        }
        #debug-toggle {
            background: #222;
            color: #0f0;
            padding: 4px 10px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #0f0;
            user-select: none;
        }
        #debug-content {
            display: none;
            background: rgba(0,0,0,0.92);
            border: 1px solid #0f0;
            padding: 8px;
            width: 260px;
            max-height: 80vh;
            overflow-y: auto;
        }
        #debug-panel.open #debug-content { display: block; }
        #debug-content h3 { margin: 0 0 6px; font-size: 13px; color: #0f0; }
        #debug-content h4 { margin: 8px 0 4px; font-size: 11px; color: #0a0; border-top: 1px solid #333; padding-top: 4px; }
        .debug-section { margin: 2px 0; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .debug-section label { width: 80px; flex-shrink: 0; color: #888; }
        .debug-section select, .debug-section input {
            background: #111; color: #0f0; border: 1px solid #333;
            padding: 2px; font-family: monospace; font-size: 10px;
        }
        .debug-section button {
            background: #222; color: #0f0; border: 1px solid #0a0;
            padding: 2px 6px; cursor: pointer; font-family: monospace; font-size: 10px;
        }
        .debug-section button:hover { background: #0a0; color: #000; }
    </style>
    <script type="module">
        if (import.meta.env.VITE_DEBUG === 'true') {
            document.getElementById('debug-panel').style.display = '';
        }
    </script>

    <script>
        // ===== SOUND ENGINE (Web Audio API) =====
        const SFX = {
            ctx: null,
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            // Play a note: freq in Hz, duration in seconds, type = sine/square/sawtooth/triangle
            tone(freq, dur = 0.15, type = 'square', vol = 0.3) {
                this.init();
                const o = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                o.type = type;
                o.frequency.value = freq;
                g.gain.value = vol;
                g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
                o.connect(g);
                g.connect(this.ctx.destination);
                o.start();
                o.stop(this.ctx.currentTime + dur);
            },
            // Fun rappy beat sequence
            collect() {
                this.tone(440, 0.08, 'square', 0.3);
                setTimeout(() => this.tone(660, 0.08, 'square', 0.3), 80);
                setTimeout(() => this.tone(880, 0.12, 'square', 0.3), 160);
            },
            hit() {
                this.tone(200, 0.1, 'sawtooth', 0.4);
                setTimeout(() => this.tone(150, 0.15, 'sawtooth', 0.3), 80);
            },
            chop() {
                this.tone(120, 0.05, 'sawtooth', 0.5);
                setTimeout(() => this.tone(80, 0.1, 'sawtooth', 0.4), 60);
            },
            talk() {
                this.tone(330, 0.06, 'triangle', 0.2);
                setTimeout(() => this.tone(390, 0.06, 'triangle', 0.2), 70);
            },
            questComplete() {
                [440, 550, 660, 880].forEach((f, i) => {
                    setTimeout(() => this.tone(f, 0.2, 'square', 0.3), i * 150);
                });
            },
            storm() {
                this.tone(60, 0.5, 'sawtooth', 0.2);
                setTimeout(() => this.tone(50, 0.4, 'sawtooth', 0.15), 300);
            },
            build() {
                this.tone(200, 0.08, 'square', 0.3);
                setTimeout(() => this.tone(300, 0.08, 'square', 0.3), 100);
                setTimeout(() => this.tone(400, 0.15, 'square', 0.3), 200);
            },
            animal() {
                this.tone(500, 0.05, 'triangle', 0.3);
                setTimeout(() => this.tone(600, 0.05, 'triangle', 0.3), 60);
                setTimeout(() => this.tone(400, 0.1, 'triangle', 0.2), 120);
            },
            mapChange() {
                [260, 330, 390, 520].forEach((f, i) => {
                    setTimeout(() => this.tone(f, 0.15, 'triangle', 0.25), i * 120);
                });
            },
        };

        // Hook into game events via localStorage polling
        (function() {
            let lastSound = '';
            setInterval(() => {
                const sound = localStorage.getItem('game-sound') || '';
                if (sound && sound !== lastSound) {
                    lastSound = sound;
                    localStorage.removeItem('game-sound');
                    if (SFX[sound]) SFX[sound]();
                }
            }, 100);

            // Initialize audio on first interaction (required by browsers)
            document.addEventListener('click', () => SFX.init(), { once: true });
            document.addEventListener('keydown', () => SFX.init(), { once: true });
        })();

        // Storm effect controller
        (function() {
            const overlay = document.getElementById('storm-overlay');
            const rpg = document.getElementById('rpg');
            setInterval(() => {
                let stormActive = localStorage.getItem('storm-active') === 'true';
                // Auto-stop the storm when the deadline has passed — guarantees
                // the storm ends even if a server-side setTimeout is unreliable.
                const deadlineStr = localStorage.getItem('storm-deadline');
                if (stormActive && deadlineStr) {
                    const deadline = parseInt(deadlineStr, 10);
                    if (!isNaN(deadline) && Date.now() >= deadline) {
                        localStorage.setItem('storm-active', 'false');
                        localStorage.removeItem('storm-deadline');
                        localStorage.setItem('storm-expired', 'true');
                        stormActive = false;
                    }
                }
                if (stormActive) {
                    overlay.className = 'storm-active';
                    rpg.classList.add('storm-shake');
                } else {
                    overlay.className = 'storm-hidden';
                    rpg.classList.remove('storm-shake');
                }
            }, 200);
        })();

        // Debug panel functions
        function dbgGetPlayer() {
            return window.__PLAYER__;
        }

        function dbgSet(key, value) {
            const p = dbgGetPlayer();
            if (!p) { console.warn('Player not ready'); return; }
            p.setVariable(key, value);
            console.log('Set', key, '=', value);
        }

        const MAP_STARTS = {
            'ship': { x: 384, y: 288 },
            'jamestown': { x: 960, y: 800 },
            'wilderness': { x: 64, y: 640 },
            'powhatan-village': { x: 320, y: 576 }
        };

        function dbgChangeMap(mapName) {
            const p = dbgGetPlayer();
            if (!p) { console.warn('Player not ready'); return; }
            const pos = MAP_STARTS[mapName] || { x: 200, y: 200 };
            console.log('Changing map to', mapName, 'at', pos);
            try {
                const result = p.changeMap(mapName, pos);
                if (result && result.then) {
                    result.then(() => console.log('Map changed to', mapName))
                          .catch(e => console.error('changeMap failed:', e));
                }
            } catch(e) {
                console.error('changeMap error:', e);
            }
        }

        function dbgJumpTo(preset) {
            const p = dbgGetPlayer();
            if (!p) { console.warn('Player not ready'); return; }

            // Reset all quest vars first
            const vars = [
                'current_quest', 'quest_1a', 'quest_1b', 'quest_1b_crates',
                'quest_1c', 'storm_hits', 'quest_1d', 'richard_friend', 'AFTER_INTRO',
                'quest_2a', 'quest_2_logs', 'quest_2b', 'quest_2_hay', 'quest_2_mud',
                'quest_2c', 'quest_2_walls', 'quest_2d', 'quest_2d_logs', 'quest_2e',
                'quest_3a', 'quest_3a_hits', 'quest_3b', 'quest_3b_hits',
                'quest_3c', 'quest_3_mussels', 'quest_3_crabs',
                'quest_3d', 'quest_3_rabbits', 'quest_3e'
            ];
            vars.forEach(v => p.setVariable(v, undefined));
            localStorage.setItem('storm-active', 'false');

            switch(preset) {
                case 'quest1-start':
                    p.setVariable('quest_1a', 'active');
                    dbgChangeMap('ship');
                    break;
                case 'quest1-crates':
                    p.setVariable('quest_1a', 'complete');
                    p.setVariable('quest_1b', 'active');
                    p.setVariable('quest_1b_crates', 0);
                    p.setVariable('current_quest', 1);
                    dbgChangeMap('ship');
                    break;
                case 'quest1-storm':
                    p.setVariable('quest_1a', 'complete');
                    p.setVariable('quest_1b', 'complete');
                    p.setVariable('quest_1c', 'active');
                    p.setVariable('storm_hits', 0);
                    p.setVariable('current_quest', 1);
                    localStorage.setItem('storm-active', 'true');
                    dbgChangeMap('ship');
                    break;
                case 'quest1-friend':
                    p.setVariable('quest_1a', 'complete');
                    p.setVariable('quest_1b', 'complete');
                    p.setVariable('quest_1c', 'complete');
                    p.setVariable('quest_1d', 'active');
                    p.setVariable('current_quest', 1);
                    dbgChangeMap('ship');
                    break;
                case 'quest1-done':
                    p.setVariable('quest_1a', 'complete');
                    p.setVariable('quest_1b', 'complete');
                    p.setVariable('quest_1c', 'complete');
                    p.setVariable('quest_1d', 'complete');
                    p.setVariable('richard_friend', true);
                    p.setVariable('current_quest', 1);
                    dbgChangeMap('ship');
                    break;
                case 'quest2-start':
                    p.setVariable('quest_1a', 'complete');
                    p.setVariable('quest_1b', 'complete');
                    p.setVariable('quest_1c', 'complete');
                    p.setVariable('quest_1d', 'complete');
                    p.setVariable('current_quest', 2);
                    dbgChangeMap('jamestown');
                    break;
                case 'quest2-build':
                    p.setVariable('current_quest', 2);
                    p.setVariable('quest_2a', 'complete');
                    p.setVariable('quest_2_logs', 10);
                    p.setVariable('quest_2b', 'complete');
                    p.setVariable('quest_2_hay', 5);
                    p.setVariable('quest_2_mud', 5);
                    p.setVariable('quest_2c', 'active');
                    p.setVariable('quest_2_walls', 0);
                    dbgChangeMap('jamestown');
                    break;
                case 'quest2-done':
                    p.setVariable('current_quest', 2);
                    p.setVariable('quest_2a', 'complete');
                    p.setVariable('quest_2b', 'complete');
                    p.setVariable('quest_2c', 'complete');
                    p.setVariable('quest_2d', 'complete');
                    p.setVariable('quest_2e', 'complete');
                    dbgChangeMap('jamestown');
                    break;
                case 'quest3-start':
                    p.setVariable('current_quest', 3);
                    dbgChangeMap('wilderness');
                    break;
                case 'quest4-start':
                    p.setVariable('current_quest', 4);
                    dbgChangeMap('powhatan-village');
                    break;
                case 'quest4-done':
                    p.setVariable('current_quest', 4);
                    p.setVariable('quest_4a', 'complete');
                    p.setVariable('quest_4b', 'complete');
                    p.setVariable('quest_4c', 'complete');
                    p.setVariable('quest_4d', 'complete');
                    p.setVariable('quest_4e', 'complete');
                    p.setVariable('quest_4f', 'complete');
                    dbgChangeMap('powhatan-village');
                    break;
                case 'quest5-start':
                    p.setVariable('current_quest', 5);
                    dbgChangeMap('jamestown');
                    break;
            }
            console.log('Jumped to', preset);
        }

        const DBG_KEYS = [
            'current_quest', 'quest_1a', 'quest_1b', 'quest_1b_crates',
            'quest_1c', 'storm_hits', 'quest_1d', 'richard_friend', 'AFTER_INTRO',
            'quest_2a', 'quest_2_logs', 'quest_2b', 'quest_2_hay', 'quest_2_mud',
            'quest_2c', 'quest_2_walls', 'quest_2d', 'quest_2d_logs', 'quest_2e',
            'quest_3a', 'quest_3a_hits', 'quest_3b', 'quest_3b_hits',
            'quest_3c', 'quest_3_mussels', 'quest_3_crabs',
            'quest_3d', 'quest_3_rabbits', 'quest_3e',
            'quest_4a', 'quest_4b', 'quest_4b_hits',
            'quest_4c', 'quest_4c_hide', 'quest_4c_sinew',
            'quest_4d', 'quest_4d_goals', 'quest_4e', 'quest_4f',
            'quest_5a', 'quest_5b', 'quest_5c', 'quest_5d'
        ];

        function dbgCopyVars() {
            const p = dbgGetPlayer();
            if (!p) return;
            const obj = {};
            DBG_KEYS.forEach(k => { const v = p.getVariable(k); if (v !== undefined) obj[k] = v; });
            const map = (p.map && p.map.id) || '?';
            const text = `map: ${map}\n` + JSON.stringify(obj, null, 2);
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('dbg-vars').textContent = '✓ Copied!';
            });
        }

        // Live variable display
        setInterval(() => {
            const p = dbgGetPlayer();
            const el = document.getElementById('dbg-vars');
            if (!p || !el) return;
            const lines = DBG_KEYS.map(k => {
                const v = p.getVariable(k);
                return `${k}: ${v === undefined ? '—' : JSON.stringify(v)}`;
            });
            const map = (p.map && p.map.id) || '?';
            lines.unshift(`map: ${map}`);
            el.textContent = lines.join('\n');
        }, 500);
    </script>
</body>

</html>
