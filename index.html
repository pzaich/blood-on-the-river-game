<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Blood on the River</title>
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, minimum-scale=1, width=device-width, height=device-height">
</head>

<body>
    <div id="rpg"></div>

    <!-- Storm overlay -->
    <div id="storm-overlay" class="storm-hidden">
        <div class="rain"></div>
        <div class="rain"></div>
        <div class="rain"></div>
        <div class="lightning"></div>
    </div>

    <style>
        body,
        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #rpg {
            position: relative;
        }

        @media (min-width: 800px) {
            #rpg {
                width: 816px;
                height: 624px;
            }
        }

        @media (max-width: 800px) {
            #rpg {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
            }
        }

        /* ===== STORM EFFECTS ===== */
        #storm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            transition: opacity 1s ease;
        }

        #storm-overlay.storm-hidden {
            opacity: 0;
            display: none;
        }

        #storm-overlay.storm-active {
            opacity: 1;
            display: block;
        }

        /* Dark overlay for stormy sky */
        #storm-overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.45);
            z-index: 1;
        }

        /* Rain streaks */
        .rain {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 200%;
            z-index: 2;
            background-image:
                linear-gradient(transparent 90%, rgba(174, 194, 224, 0.4) 90%, rgba(174, 194, 224, 0.4) 91%, transparent 91%),
                linear-gradient(transparent 85%, rgba(174, 194, 224, 0.3) 85%, rgba(174, 194, 224, 0.3) 86%, transparent 86%);
            background-size: 3px 40px, 5px 55px;
            animation: rain-fall linear infinite;
        }

        .rain:nth-child(1) {
            animation-duration: 0.4s;
            background-size: 2px 35px, 4px 50px;
            opacity: 0.8;
        }

        .rain:nth-child(2) {
            animation-duration: 0.55s;
            background-size: 3px 42px, 5px 60px;
            opacity: 0.6;
            left: 10px;
        }

        .rain:nth-child(3) {
            animation-duration: 0.35s;
            background-size: 2px 30px, 3px 45px;
            opacity: 0.9;
            left: -5px;
        }

        @keyframes rain-fall {
            0% {
                transform: translateY(0) rotate(5deg);
            }
            100% {
                transform: translateY(50%) rotate(5deg);
            }
        }

        /* Lightning flash */
        .lightning {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            background: white;
            opacity: 0;
            animation: lightning-flash 4s infinite;
        }

        @keyframes lightning-flash {
            0% { opacity: 0; }
            1% { opacity: 0.6; }
            2% { opacity: 0; }
            3% { opacity: 0.3; }
            4% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Screen shake during storm */
        #rpg.storm-shake {
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, -1px); }
            75% { transform: translate(-1px, 2px); }
            100% { transform: translate(1px, -2px); }
        }
    </style>

    <!-- Debug Panel (dev mode only) -->
    <div id="debug-panel">
        <div id="debug-toggle" onclick="document.getElementById('debug-panel').classList.toggle('open')">DEBUG</div>
        <div id="debug-content">
            <h3>Quest State</h3>
            <div class="debug-section">
                <label>Current Quest</label>
                <select id="dbg-current-quest" onchange="dbgSet('current_quest', +this.value)">
                    <option value="0">0 - Not started</option>
                    <option value="1">1 - Voyage</option>
                    <option value="2">2 - Building</option>
                    <option value="3">3 - Hunting</option>
                    <option value="4">4 - Powhatan</option>
                    <option value="5">5 - Finale</option>
                </select>
            </div>

            <h4>Quest 1: Voyage</h4>
            <div class="debug-section">
                <label>1a Meet Smith</label>
                <select onchange="dbgSet('quest_1a', this.value)">
                    <option value="">—</option>
                    <option value="active">active</option>
                    <option value="complete">complete</option>
                </select>
            </div>
            <div class="debug-section">
                <label>1b Crates</label>
                <select onchange="dbgSet('quest_1b', this.value)">
                    <option value="">—</option>
                    <option value="active">active</option>
                    <option value="complete">complete</option>
                </select>
                <input type="number" min="0" max="3" value="0" style="width:40px" onchange="dbgSet('quest_1b_crates', +this.value)" placeholder="crates">
            </div>
            <div class="debug-section">
                <label>1c Storm</label>
                <select onchange="dbgSet('quest_1c', this.value)">
                    <option value="">—</option>
                    <option value="active">active</option>
                    <option value="survived">survived</option>
                    <option value="complete">complete</option>
                </select>
                <input type="number" min="0" max="3" value="0" style="width:40px" onchange="dbgSet('storm_hits', +this.value)" placeholder="hits">
            </div>
            <div class="debug-section">
                <label>1d Friend</label>
                <select onchange="dbgSet('quest_1d', this.value)">
                    <option value="">—</option>
                    <option value="active">active</option>
                    <option value="complete">complete</option>
                </select>
            </div>

            <h4>Quick Jump</h4>
            <div class="debug-section">
                <button onclick="dbgJumpTo('quest1-start')">Q1 Start</button>
                <button onclick="dbgJumpTo('quest1-crates')">Q1 Crates</button>
                <button onclick="dbgJumpTo('quest1-storm')">Q1 Storm</button>
                <button onclick="dbgJumpTo('quest1-friend')">Q1 Friend</button>
                <button onclick="dbgJumpTo('quest1-done')">Q1 Done</button>
                <button onclick="dbgJumpTo('quest2-start')">Q2 Start</button>
            </div>

            <h4>Map</h4>
            <div class="debug-section">
                <button onclick="dbgChangeMap('ship')">Ship</button>
                <button onclick="dbgChangeMap('jamestown')">Jamestown</button>
                <button onclick="dbgChangeMap('wilderness')">Wilderness</button>
                <button onclick="dbgChangeMap('powhatan-village')">Powhatan</button>
            </div>

            <h4>Storm FX</h4>
            <div class="debug-section">
                <button onclick="localStorage.setItem('storm-active','true')">Storm ON</button>
                <button onclick="localStorage.setItem('storm-active','false')">Storm OFF</button>
            </div>

            <h4>Live Variables <button onclick="dbgCopyVars()" style="font-size:9px">Copy</button></h4>
            <pre id="dbg-vars" style="font-size:10px;max-height:150px;overflow:auto;background:#111;padding:4px;margin:4px 0;">Loading...</pre>
        </div>
    </div>

    <style>
        /* ===== DEBUG PANEL ===== */
        #debug-panel {
            position: fixed;
            top: 0;
            right: 0;
            z-index: 10000;
            font-family: monospace;
            font-size: 11px;
            color: #0f0;
            pointer-events: auto;
        }
        #debug-toggle {
            background: #222;
            color: #0f0;
            padding: 4px 10px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #0f0;
            user-select: none;
        }
        #debug-content {
            display: none;
            background: rgba(0,0,0,0.92);
            border: 1px solid #0f0;
            padding: 8px;
            width: 260px;
            max-height: 80vh;
            overflow-y: auto;
        }
        #debug-panel.open #debug-content { display: block; }
        #debug-content h3 { margin: 0 0 6px; font-size: 13px; color: #0f0; }
        #debug-content h4 { margin: 8px 0 4px; font-size: 11px; color: #0a0; border-top: 1px solid #333; padding-top: 4px; }
        .debug-section { margin: 2px 0; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .debug-section label { width: 80px; flex-shrink: 0; color: #888; }
        .debug-section select, .debug-section input {
            background: #111; color: #0f0; border: 1px solid #333;
            padding: 2px; font-family: monospace; font-size: 10px;
        }
        .debug-section button {
            background: #222; color: #0f0; border: 1px solid #0a0;
            padding: 2px 6px; cursor: pointer; font-family: monospace; font-size: 10px;
        }
        .debug-section button:hover { background: #0a0; color: #000; }
    </style>

    <script>
        // Storm effect controller
        (function() {
            const overlay = document.getElementById('storm-overlay');
            const rpg = document.getElementById('rpg');
            setInterval(() => {
                const stormActive = localStorage.getItem('storm-active') === 'true';
                if (stormActive) {
                    overlay.className = 'storm-active';
                    rpg.classList.add('storm-shake');
                } else {
                    overlay.className = 'storm-hidden';
                    rpg.classList.remove('storm-shake');
                }
            }, 200);
        })();

        // Debug panel functions
        function dbgGetPlayer() {
            return window.__PLAYER__;
        }

        function dbgSet(key, value) {
            const p = dbgGetPlayer();
            if (!p) { console.warn('Player not ready'); return; }
            p.setVariable(key, value);
            console.log('Set', key, '=', value);
        }

        function dbgChangeMap(mapName) {
            const p = dbgGetPlayer();
            if (!p) { console.warn('Player not ready'); return; }
            p.changeMap(mapName);
        }

        function dbgJumpTo(preset) {
            const p = dbgGetPlayer();
            if (!p) { console.warn('Player not ready'); return; }

            // Reset all quest vars first
            const vars = [
                'current_quest', 'quest_1a', 'quest_1b', 'quest_1b_crates',
                'quest_1c', 'storm_hits', 'quest_1d', 'richard_friend', 'AFTER_INTRO'
            ];
            vars.forEach(v => p.setVariable(v, undefined));
            localStorage.setItem('storm-active', 'false');

            switch(preset) {
                case 'quest1-start':
                    p.setVariable('quest_1a', 'active');
                    p.changeMap('ship');
                    break;
                case 'quest1-crates':
                    p.setVariable('quest_1a', 'complete');
                    p.setVariable('quest_1b', 'active');
                    p.setVariable('quest_1b_crates', 0);
                    p.setVariable('current_quest', 1);
                    p.changeMap('ship');
                    break;
                case 'quest1-storm':
                    p.setVariable('quest_1a', 'complete');
                    p.setVariable('quest_1b', 'complete');
                    p.setVariable('quest_1c', 'active');
                    p.setVariable('storm_hits', 0);
                    p.setVariable('current_quest', 1);
                    localStorage.setItem('storm-active', 'true');
                    p.changeMap('ship');
                    break;
                case 'quest1-friend':
                    p.setVariable('quest_1a', 'complete');
                    p.setVariable('quest_1b', 'complete');
                    p.setVariable('quest_1c', 'complete');
                    p.setVariable('quest_1d', 'active');
                    p.setVariable('current_quest', 1);
                    p.changeMap('ship');
                    break;
                case 'quest1-done':
                    p.setVariable('quest_1a', 'complete');
                    p.setVariable('quest_1b', 'complete');
                    p.setVariable('quest_1c', 'complete');
                    p.setVariable('quest_1d', 'complete');
                    p.setVariable('richard_friend', true);
                    p.setVariable('current_quest', 1);
                    p.changeMap('ship');
                    break;
                case 'quest2-start':
                    p.setVariable('quest_1a', 'complete');
                    p.setVariable('quest_1b', 'complete');
                    p.setVariable('quest_1c', 'complete');
                    p.setVariable('quest_1d', 'complete');
                    p.setVariable('current_quest', 2);
                    p.changeMap('jamestown');
                    break;
            }
            console.log('Jumped to', preset);
        }

        const DBG_KEYS = [
            'current_quest', 'quest_1a', 'quest_1b', 'quest_1b_crates',
            'quest_1c', 'storm_hits', 'quest_1d', 'richard_friend', 'AFTER_INTRO'
        ];

        function dbgCopyVars() {
            const p = dbgGetPlayer();
            if (!p) return;
            const obj = {};
            DBG_KEYS.forEach(k => { const v = p.getVariable(k); if (v !== undefined) obj[k] = v; });
            const map = (p.map && p.map.id) || '?';
            const text = `map: ${map}\n` + JSON.stringify(obj, null, 2);
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('dbg-vars').textContent = '✓ Copied!';
            });
        }

        // Live variable display
        setInterval(() => {
            const p = dbgGetPlayer();
            const el = document.getElementById('dbg-vars');
            if (!p || !el) return;
            const lines = DBG_KEYS.map(k => {
                const v = p.getVariable(k);
                return `${k}: ${v === undefined ? '—' : JSON.stringify(v)}`;
            });
            const map = (p.map && p.map.id) || '?';
            lines.unshift(`map: ${map}`);
            el.textContent = lines.join('\n');
        }, 500);
    </script>
</body>

</html>
